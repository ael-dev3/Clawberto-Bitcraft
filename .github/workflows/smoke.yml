name: Smoke test overlay

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '13 * * * *'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Refresh runtime caches
        run: |
          npm run update:ael-cache
          npm run update:tracked-cache

      - name: Typecheck and test
        run: |
          npm run typecheck
          npm run test
          npm run build

      - name: Start Vite preview server
        run: |
          npm run preview -- --host 127.0.0.1 --port 8131 > /tmp/bitcraft-vite-preview.log 2>&1 &
          echo $! > /tmp/bitcraft-vite-preview.pid

      - name: Run local smoke test
        run: npm run smoke:test -- http://127.0.0.1:8131/

      - name: Run hosted smoke test
        run: npm run smoke:hosted
