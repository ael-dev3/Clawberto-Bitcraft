name: Smoke test overlay

on:
  workflow_call:
    inputs:
      run_hosted_smoke:
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '13 * * * *'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Refresh runtime caches
        run: |
          npm run update:ael-cache
          npm run update:tracked-cache

      - name: Run formatter/lint-or-check
        run: npm run lint-or-check

      - name: Run npm run check
        run: npm run check

      - name: Run local smoke against preview
        run: npm run smoke:local

      - name: Run hosted smoke test
        if: ${{ github.event_name != 'workflow_call' || inputs.run_hosted_smoke }}
        run: npm run smoke:hosted
